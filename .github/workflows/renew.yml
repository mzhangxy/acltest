name: ACLClouds Auto Renew (SB UC Mode)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时执行一次

jobs:
  renew-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr xvfb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase pytesseract pillow requests

      - name: Execute Renew Script
        env:
          MC_EMAIL: ${{ secrets.MC_EMAIL }}
          MC_PASSWORD: ${{ secrets.MC_PASSWORD }}
          MC_COOKIE: ${{ secrets.MC_COOKIE }}
          MC_PROXY: ${{ secrets.MC_PROXY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python renew.py
